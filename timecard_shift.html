<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>シフト管理 Demo</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><script src="firebase-config.demo.js"></script>
<style>:root{--brand:#0075de;--bg:#f6f5f4;--panel:#fff;--text:#202124;--muted:#615d59;--line:rgba(0,0,0,.1);--danger:#c62828;--shadow:rgba(31,35,40,.07) 0 12px 32px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,"Noto Sans JP",system-ui,sans-serif;color:var(--text);font-size:16px}.demo-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#d32f2f;color:#fff;text-align:center;padding:7px 12px;font-weight:800;font-size:13px}.shell{width:min(1240px,calc(100% - 32px));margin:0 auto;padding:56px 0 48px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.eyebrow{color:var(--brand);font-size:12px;font-weight:900;letter-spacing:.08em}h1{margin:4px 0 0;font-size:34px}.nav{display:flex;gap:10px;flex-wrap:wrap}.button,button{min-height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:9px 13px;text-decoration:none;font:inherit;font-weight:800;cursor:pointer}.primary{background:var(--brand);border-color:var(--brand);color:#fff}.danger{color:var(--danger)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}.muted,label{color:var(--muted);font-size:13px}label{display:block;font-weight:800;margin-bottom:6px}input,select{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font:inherit}.table-wrap{overflow-x:auto}table{width:100%;min-width:940px;border-collapse:collapse}th,td{padding:12px 13px;border-bottom:1px solid var(--line);text-align:left}th{background:#f8fafc;color:var(--muted);font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;background:#eaf4ff;color:#005fb8}.toast{position:fixed;right:18px;bottom:18px;background:#111;color:#fff;border-radius:8px;padding:12px 14px;opacity:0;transform:translateY(8px);transition:.18s}@media(max-width:820px){.shell{width:min(100% - 24px,680px)}.topbar{flex-direction:column}.nav,.nav .button{width:100%}.grid{grid-template-columns:1fr}table,tbody,tr,td{display:block;width:100%}table{min-width:0}thead{display:none}.table-wrap{overflow:visible}tr{border:1px solid var(--line);border-radius:12px;margin-top:12px;padding:12px 14px;background:#fff}td{display:grid;grid-template-columns:110px 1fr;gap:10px;padding:9px 0}td:before{content:attr(data-label);color:var(--muted);font-weight:800}}</style></head>
<body><div class="demo-banner">DEMO版 - この画面はデモです。本番データではありません。</div><main class="shell"><div class="topbar"><div><div class="eyebrow">SAKURA SYSTEM DEMO</div><h1>シフト管理</h1><p class="muted" id="userLine">認証確認中...</p></div><div class="nav"><a class="button" href="timecard.html">タイムカード</a><a class="button" href="timecard_applications.html">届出・有給</a><a class="button" href="timecard_report.html" id="reportLink" style="display:none">レポート</a><a class="button" href="timecard_guide.html">使い方</a></div></div>
<section class="panel"><div class="grid"><div><label>対象月</label><input type="month" id="monthPicker"></div></div></section>
<section class="panel"><h2>シフト作成</h2><form id="shiftForm" class="grid"><input type="hidden" id="shiftId"><div id="shiftUserWrap"><label>ユーザー</label><select id="shiftUser"></select></div><div><label>日付</label><input type="date" id="shiftDate"></div><div><label>区分</label><select id="shiftType"><option value="work">勤務</option><option value="holiday">休日</option><option value="paid_leave">有給予定</option><option value="leave">休暇予定</option></select></div><div><label>出勤予定</label><input type="time" id="shiftStart" value="09:00"></div><div><label>退勤予定</label><input type="time" id="shiftEnd" value="18:00"></div><div><label>休憩分</label><input type="number" id="shiftBreak" value="60" min="0"></div><div style="grid-column:1/-1"><label>メモ</label><input type="text" id="shiftNote"></div><div><button class="primary" type="submit">保存</button></div></form><p class="muted">一般ユーザーも自分のシフトを新規作成できます。修正・削除は管理者のみ可能です。</p></section>
<section class="panel" id="requestPanel"><h2>希望シフト申請</h2><form id="requestForm" class="grid"><div><label>希望日</label><input type="date" id="requestDate"></div><div><label>区分</label><select id="requestType"><option value="work">勤務</option><option value="holiday">休日</option><option value="paid_leave">有給予定</option><option value="leave">休暇予定</option></select></div><div><label>出勤希望</label><input type="time" id="requestStart" value="09:00"></div><div><label>退勤希望</label><input type="time" id="requestEnd" value="18:00"></div><div><label>休憩分</label><input type="number" id="requestBreak" value="60" min="0"></div><div><label>メモ</label><input type="text" id="requestNote"></div><div><button class="primary" type="submit">申請</button></div></form></section>
<section class="panel"><h2>登録済みシフト</h2><div class="table-wrap"><table><thead><tr><th>日付</th><th>ユーザー</th><th>区分</th><th>予定</th><th>休憩</th><th>メモ</th><th>操作</th></tr></thead><tbody id="shiftRows"></tbody></table></div></section>
<section class="panel"><h2>希望シフト申請</h2><div class="table-wrap"><table><thead><tr><th>日付</th><th>ユーザー</th><th>区分</th><th>希望</th><th>状態</th><th>メモ</th><th>操作</th></tr></thead><tbody id="requestRows"></tbody></table></div></section></main><div class="toast" id="toast"></div>
<script>
firebase.initializeApp(DEMO_FIREBASE_CONFIG);const db=firebase.firestore();if(location.hostname==='localhost'||location.hostname==='127.0.0.1')db.useEmulator('127.0.0.1',8080);const TS=firebase.firestore.Timestamp;let currentUser=null,profile=null,roleUsers={},shifts=[],requests=[];const fallbackRoles={'demo@sakura-demo.jp':{display_name:'佐藤 太郎',role:'admin',employee_no:'EMP001'},'oem@sakura-demo.jp':{display_name:'田中 花子',role:'user',employee_no:'EMP002'},'agent@sakura-demo.jp':{display_name:'山田 翔太',role:'part',employee_no:'EMP003'}};function pad(v){return String(v).padStart(2,'0')}function today(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function currentMonth(){return today().slice(0,7)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function show(m){toast.textContent=m;toast.classList.add('show');clearTimeout(show.t);show.t=setTimeout(()=>toast.classList.remove('show'),2600)}function isAdmin(){return profile?.role==='admin'}function typeLabel(t){return {work:'勤務',holiday:'休日',paid_leave:'有給予定',leave:'休暇予定'}[t]||t}function makeId(prefix,email,date){return `${prefix}_${email.replace(/[^a-zA-Z0-9_-]/g,'_')}_${date}_${Date.now()}`}
firebase.auth().onAuthStateChanged(async user=>{if(!user){location.href='index.html';return}currentUser=user;const ss=await db.collection('demo_sessions').doc(user.uid).get();const sd=ss.data();if(!ss.exists||!sd.active||sd.disabled||sd.expiresAt.toDate()<new Date()){await firebase.auth().signOut();location.href='index.html';return}const cfg=await db.collection('demo_timecard_config').doc('roles').get().catch(()=>null);roleUsers={...fallbackRoles,...((cfg&&cfg.exists&&cfg.data().users)||{})};profile=roleUsers[user.email]||fallbackRoles[user.email]||{display_name:user.email,role:'user'};userLine.textContent=`${profile.display_name} / ${user.email} / ${profile.role}`;reportLink.style.display=isAdmin()?'inline-flex':'none';requestPanel.style.display=isAdmin()?'none':'block';monthPicker.value=currentMonth();setupUsers();loadAll();});
function setupUsers(){if(isAdmin()){shiftUserWrap.style.display='block';shiftUser.innerHTML=Object.keys(roleUsers).map(e=>`<option value="${esc(e)}">${esc(roleUsers[e].display_name)} / ${esc(e)}</option>`).join('')}else{shiftUserWrap.style.display='none';shiftUser.innerHTML=`<option value="${esc(currentUser.email)}">${esc(profile.display_name)}</option>`}}
async function loadAll(){const month=monthPicker.value||currentMonth();shifts=[];requests=[];let s=await db.collection('demo_timecard_shifts').get();s.forEach(d=>{const r={id:d.id,...d.data()};if(!r.archived&&(r.date||'').startsWith(month)&&(isAdmin()||r.user_id===currentUser.email))shifts.push(r)});let q=await db.collection('demo_timecard_shift_requests').get();q.forEach(d=>{const r={id:d.id,...d.data()};if(!r.archived&&(r.date||'').startsWith(month)&&(isAdmin()||r.user_id===currentUser.email))requests.push(r)});shifts.sort((a,b)=>a.date.localeCompare(b.date));requests.sort((a,b)=>a.date.localeCompare(b.date));render();}
function render(){shiftRows.innerHTML=shifts.map(s=>`<tr><td data-label="日付">${esc(s.date)}</td><td data-label="ユーザー">${esc(s.user_name)}<br><span class="muted">${esc(s.user_id)}</span></td><td data-label="区分"><span class="pill">${typeLabel(s.shift_type)}</span></td><td data-label="予定">${esc(s.start||'--')} - ${esc(s.end||'--')}</td><td data-label="休憩">${esc(s.break_minutes||0)}分</td><td data-label="メモ">${esc(s.note||'')}</td><td data-label="操作">${isAdmin()?`<button onclick="editShift('${esc(s.id)}')">編集</button> <button class="danger" onclick="deleteShift('${esc(s.id)}')">削除</button>`:''}</td></tr>`).join('')||'<tr><td colspan="7">シフトはありません。</td></tr>';requestRows.innerHTML=requests.map(r=>`<tr><td data-label="日付">${esc(r.date)}</td><td data-label="ユーザー">${esc(r.user_name)}</td><td data-label="区分"><span class="pill">${typeLabel(r.shift_type)}</span></td><td data-label="希望">${esc(r.start||'--')} - ${esc(r.end||'--')}</td><td data-label="状態">${esc(r.status)}</td><td data-label="メモ">${esc(r.note||r.manager_note||'')}</td><td data-label="操作">${isAdmin()&&r.status==='申請中'?`<button onclick="approveReq('${esc(r.id)}')">承認</button> <button class="danger" onclick="rejectReq('${esc(r.id)}')">差戻し</button>`:''}</td></tr>`).join('')||'<tr><td colspan="7">申請はありません。</td></tr>'}
shiftForm.addEventListener('submit',async e=>{e.preventDefault();const editId=shiftId.value;if(editId&&!isAdmin())return show('登録済みシフトの修正は管理者のみ可能です');const email=isAdmin()?shiftUser.value:currentUser.email;const u=roleUsers[email]||{display_name:email,role:'user'};const data={isDemo:true,user_id:email,user_uid:email===currentUser.email?currentUser.uid:'',user_name:u.display_name,user_role:u.role,date:shiftDate.value,shift_type:shiftType.value,start:shiftStart.value,end:shiftEnd.value,break_minutes:Number(shiftBreak.value||0),note:shiftNote.value,updatedAt:TS.now(),updatedBy:currentUser.uid};if(!data.date)return show('日付を入力してください');if(editId){await db.collection('demo_timecard_shifts').doc(editId).update(data)}else{data.createdAt=TS.now();data.createdBy=currentUser.uid;await db.collection('demo_timecard_shifts').doc(makeId('shift',email,data.date)).set(data)}show('保存しました');shiftForm.reset();shiftId.value='';shiftStart.value='09:00';shiftEnd.value='18:00';shiftBreak.value='60';setupUsers();loadAll();});
requestForm.addEventListener('submit',async e=>{e.preventDefault();const data={isDemo:true,user_id:currentUser.email,user_uid:currentUser.uid,user_name:profile.display_name,user_role:profile.role,date:requestDate.value,shift_type:requestType.value,start:requestStart.value,end:requestEnd.value,break_minutes:Number(requestBreak.value||0),note:requestNote.value,status:'申請中',createdAt:TS.now(),createdBy:currentUser.uid,updatedAt:TS.now(),updatedBy:currentUser.uid};if(!data.date)return show('希望日を入力してください');await db.collection('demo_timecard_shift_requests').doc(makeId('shiftreq',currentUser.email,data.date)).set(data);show('申請しました');requestForm.reset();requestStart.value='09:00';requestEnd.value='18:00';requestBreak.value='60';loadAll();});
window.editShift=id=>{const s=shifts.find(x=>x.id===id);if(!s)return;shiftId.value=s.id;shiftUser.value=s.user_id;shiftDate.value=s.date;shiftType.value=s.shift_type;shiftStart.value=s.start;shiftEnd.value=s.end;shiftBreak.value=s.break_minutes;shiftNote.value=s.note||''};window.deleteShift=async id=>{if(!confirm('一覧から非表示にしますか？'))return;await db.collection('demo_timecard_shifts').doc(id).update({archived:true,archivedAt:TS.now(),archivedBy:currentUser.uid,updatedAt:TS.now(),updatedBy:currentUser.uid});show('アーカイブしました');loadAll()};window.approveReq=async id=>{const r=requests.find(x=>x.id===id);if(!r)return;await db.collection('demo_timecard_shift_requests').doc(id).update({status:'承認済み',updatedAt:TS.now(),updatedBy:currentUser.uid});await db.collection('demo_timecard_shifts').doc(makeId('shift',r.user_id,r.date)).set({...r,status:null,archived:false,note:'希望シフト承認: '+(r.note||''),createdAt:TS.now(),createdBy:currentUser.uid,updatedAt:TS.now(),updatedBy:currentUser.uid});show('承認しました');loadAll()};window.rejectReq=async id=>{await db.collection('demo_timecard_shift_requests').doc(id).update({status:'差戻し',manager_note:'差戻し',updatedAt:TS.now(),updatedBy:currentUser.uid});show('差戻しました');loadAll()};monthPicker.addEventListener('change',loadAll);
</script></body></html>
