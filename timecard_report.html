<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠レポート Demo | SAKURA SYSTEM</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.demo.js"></script>
<style>
:root{--brand:#0075de;--accent:#c82054;--bg:#f6f5f4;--panel:#fff;--text:#202124;--muted:#615d59;--line:rgba(0,0,0,.1);--ok:#16833a;--warn:#9a6400;--danger:#c62828;--shadow:rgba(31,35,40,.07) 0 12px 32px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,"Noto Sans JP",system-ui,sans-serif;font-size:16px}.demo-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#d32f2f;color:#fff;text-align:center;padding:7px 12px;font-weight:800;font-size:13px}.shell{width:min(1240px,calc(100% - 32px));margin:0 auto;padding:56px 0 48px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.eyebrow{color:var(--brand);font-size:12px;font-weight:900;letter-spacing:.08em}h1{margin:4px 0 0;font-size:34px}h2{margin:0 0 14px;font-size:21px}.nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.button,button{min-height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:9px 13px;text-decoration:none;font:inherit;font-weight:800;cursor:pointer}.primary{background:var(--brand);border-color:var(--brand);color:#fff}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{border:1px solid var(--line);border-radius:10px;padding:14px;background:#fbfbfb}.metric span{display:block;color:var(--muted);font-size:12px;font-weight:800}.metric strong{font-size:26px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}label{display:block;color:var(--muted);font-size:13px;font-weight:800;margin-bottom:4px}input,select{min-height:42px;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font:inherit;background:#fff}.table-wrap{overflow-x:auto}table{width:100%;min-width:980px;border-collapse:collapse}th,td{padding:12px 13px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f8fafc;color:var(--muted);font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;background:#eaf4ff;color:#005fb8}.pill.ok{background:#eaf7ee;color:var(--ok)}.pill.warn{background:#fff7e6;color:var(--warn)}.pill.bad{background:#fff0f4;color:var(--danger)}.muted{color:var(--muted)}@media(max-width:860px){body{font-size:15px}.shell{width:min(100% - 24px,680px);padding-top:58px}.topbar{flex-direction:column}.nav,.nav .button{width:100%}h1{font-size:28px}.summary{grid-template-columns:1fr 1fr}table,tbody,tr,td{display:block;width:100%}table{min-width:0}thead{display:none}.table-wrap{overflow:visible}tr{border:1px solid var(--line);border-radius:12px;margin-top:12px;padding:12px 14px;background:#fff}td{display:grid;grid-template-columns:118px minmax(0,1fr);gap:10px;padding:9px 0}td:before{content:attr(data-label);color:var(--muted);font-size:13px;font-weight:800}}
</style>
</head>
<body>
<div class="demo-banner">DEMO版 - この画面はデモです。本番データではありません。</div>
<main class="shell">
  <div class="topbar">
    <div><div class="eyebrow">SAKURA SYSTEM DEMO</div><h1>勤怠レポート・アラート</h1><p class="muted" id="userLine">認証確認中...</p></div>
    <div class="nav"><a class="button" href="timecard.html">タイムカード</a><a class="button" href="timecard_shift.html">シフト</a><a class="button" href="timecard_applications.html">届出・有給</a><a class="button" href="timecard_guide.html">使い方</a></div>
  </div>
  <section class="panel"><div class="toolbar"><label>対象月<br><input type="month" id="monthPicker"></label><label>給与CSV形式<br><select id="csvType"><option>汎用CSV</option><option>弥生給与</option><option>PCA給与</option><option>給与奉行クラウド</option><option>freee人事労務</option></select></label><label>文字コード<br><select id="charset"><option value="utf-8">UTF-8</option><option value="sjis">Shift_JIS（表示名のみ）</option></select></label><button class="primary" onclick="downloadPayrollCsv()">給与CSV出力</button></div></section>
  <section class="panel"><div class="summary"><div class="metric"><span>月間実働</span><strong id="sumWork">0h</strong></div><div class="metric"><span>残業</span><strong id="sumOver">0h</strong></div><div class="metric"><span>深夜</span><strong id="sumNight">0h</strong></div><div class="metric"><span>休日勤務</span><strong id="sumHoliday">0h</strong></div></div></section>
  <section class="panel"><h2>36協定アラート</h2><div class="table-wrap"><table><thead><tr><th>ユーザー</th><th>残業時間</th><th>判定</th><th>コメント</th></tr></thead><tbody id="alert36Rows"></tbody></table></div></section>
  <section class="panel"><h2>アラート一覧</h2><div class="table-wrap"><table><thead><tr><th>日付</th><th>ユーザー</th><th>種別</th><th>内容</th><th>状態</th></tr></thead><tbody id="alertRows"></tbody></table></div></section>
  <section class="panel"><h2>日別レポート</h2><div class="table-wrap"><table><thead><tr><th>日付</th><th>ユーザー</th><th>出勤</th><th>退勤</th><th>実働</th><th>残業</th><th>深夜</th><th>休日</th><th>承認</th></tr></thead><tbody id="reportRows"></tbody></table></div></section>
</main>
<script>
firebase.initializeApp(DEMO_FIREBASE_CONFIG);const db=firebase.firestore();if(location.hostname==='localhost'||location.hostname==='127.0.0.1')db.useEmulator('127.0.0.1',8080);let currentUser=null,profile=null,roleUsers={},records=[],applications=[];const fallbackRoles={'demo@sakura-demo.jp':{display_name:'佐藤 太郎',role:'admin',employee_no:'EMP001'},'oem@sakura-demo.jp':{display_name:'田中 花子',role:'user',employee_no:'EMP002'},'agent@sakura-demo.jp':{display_name:'山田 翔太',role:'part',employee_no:'EMP003'}};function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function pad(v){return String(v).padStart(2,'0')}function monthNow(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}`}function minOf(t){if(!t)return 0;const [h,m]=t.split(':').map(Number);return h*60+m}function breakMin(b){return (b||[]).reduce((s,x)=>s+(x.start&&x.end?Math.max(0,minOf(x.end)-minOf(x.start)):0),0)}function workMin(r){return r.clock_in&&r.clock_out?Math.max(0,minOf(r.clock_out)-minOf(r.clock_in)-breakMin(r.breaks)):0}function overMin(r){return Math.max(0,workMin(r)-480)}function nightMin(r){if(!r.clock_out)return 0;const out=minOf(r.clock_out);return out>1320?out-1320:0}function isHoliday(date){const d=new Date(date+'T00:00:00');return d.getDay()===0||d.getDay()===6}function fmt(n){n=Math.round(n||0);return `${Math.floor(n/60)}h${pad(n%60)}m`}function statusClass(v){return v==='超過'||v==='退勤忘れ'||v==='休憩中'?'bad':v==='注意'||v==='申請中'?'warn':'ok'}
firebase.auth().onAuthStateChanged(async user=>{if(!user){location.href='index.html';return}currentUser=user;const ss=await db.collection('demo_sessions').doc(user.uid).get();const sd=ss.data();if(!ss.exists||!sd.active||sd.disabled||sd.expiresAt.toDate()<new Date()){await firebase.auth().signOut();location.href='index.html';return}const cfg=await db.collection('demo_timecard_config').doc('roles').get().catch(()=>null);roleUsers={...fallbackRoles,...((cfg&&cfg.exists&&cfg.data().users)||{})};profile=roleUsers[user.email]||{display_name:user.email,role:'user'};if(profile.role!=='admin'){location.href='timecard.html';return}userLine.textContent=`${profile.display_name} / 管理者`;monthPicker.value=monthNow();await loadAll();});
monthPicker.addEventListener('change',loadAll);
async function loadAll(){const month=monthPicker.value||monthNow();records=[];applications=[];let r=await db.collection('demo_timecards').get();r.forEach(d=>{const v={id:d.id,...d.data()};if((v.date||'').startsWith(month))records.push(v)});let a=await db.collection('demo_timecard_applications').get();a.forEach(d=>{const v={id:d.id,...d.data()};if((v.date||'').startsWith(month))applications.push(v)});records.sort((a,b)=>(a.date+a.user_id).localeCompare(b.date+b.user_id));render();}
function render(){const totalWork=records.reduce((s,r)=>s+workMin(r),0),totalOver=records.reduce((s,r)=>s+overMin(r),0),totalNight=records.reduce((s,r)=>s+nightMin(r),0),totalHoliday=records.filter(r=>isHoliday(r.date)&&workMin(r)>0).reduce((s,r)=>s+workMin(r),0);sumWork.textContent=fmt(totalWork);sumOver.textContent=fmt(totalOver);sumNight.textContent=fmt(totalNight);sumHoliday.textContent=fmt(totalHoliday);const byUser={};records.forEach(r=>{byUser[r.user_id]=(byUser[r.user_id]||0)+overMin(r)});alert36Rows.innerHTML=Object.keys(roleUsers).map(email=>{const over=byUser[email]||0;const h=over/60;const judge=h>=45?'超過':h>=35?'注意':'安全';const msg=judge==='超過'?'36協定の上限目安を超えています':judge==='注意'?'上限に近づいています':'問題ありません';return `<tr><td data-label="ユーザー">${esc(roleUsers[email].display_name)}<br><span class="muted">${esc(email)}</span></td><td data-label="残業時間">${fmt(over)}</td><td data-label="判定"><span class="pill ${statusClass(judge)}">${judge}</span></td><td data-label="コメント">${msg}</td></tr>`}).join('');const alerts=[];records.forEach(r=>{if(r.clock_in&&!r.clock_out)alerts.push([r.date,r.user_name,'退勤忘れ','出勤のみで退勤がありません','退勤忘れ']);if((r.breaks||[]).some(b=>b.start&&!b.end))alerts.push([r.date,r.user_name,'休憩終了忘れ','開始済み休憩が終了していません','休憩中']);if(overMin(r)>0)alerts.push([r.date,r.user_name,'残業',fmt(overMin(r))+' の残業があります','注意']);if(nightMin(r)>0)alerts.push([r.date,r.user_name,'深夜',fmt(nightMin(r))+' の深夜時間があります','注意']);if(isHoliday(r.date)&&workMin(r)>0)alerts.push([r.date,r.user_name,'休日出勤','休日勤務が記録されています','注意']);if(r.approval_status==='申請中')alerts.push([r.date,r.user_name,'承認待ち','勤怠が申請中です','申請中']);});applications.filter(a=>a.status==='申請中').forEach(a=>alerts.push([a.date,a.user_name,'届出承認待ち',a.type+' の申請があります','申請中']));alertRows.innerHTML=alerts.map(a=>`<tr><td data-label="日付">${esc(a[0])}</td><td data-label="ユーザー">${esc(a[1])}</td><td data-label="種別">${esc(a[2])}</td><td data-label="内容">${esc(a[3])}</td><td data-label="状態"><span class="pill ${statusClass(a[4])}">${esc(a[4])}</span></td></tr>`).join('')||'<tr><td colspan="5">アラートはありません。</td></tr>';reportRows.innerHTML=records.map(r=>`<tr><td data-label="日付">${esc(r.date)}</td><td data-label="ユーザー">${esc(r.user_name)}</td><td data-label="出勤">${esc(r.clock_in||'--')}</td><td data-label="退勤">${esc(r.clock_out||'--')}</td><td data-label="実働">${fmt(workMin(r))}</td><td data-label="残業">${fmt(overMin(r))}</td><td data-label="深夜">${fmt(nightMin(r))}</td><td data-label="休日">${isHoliday(r.date)?'対象':'-'}</td><td data-label="承認">${esc(r.approval_status||'未申請')}</td></tr>`).join('')||'<tr><td colspan="9">勤怠データはありません。</td></tr>'}
function downloadPayrollCsv(){const header=['形式','対象月','社員番号','氏名','メール','勤務日数','実働分','残業分','深夜分','休日分'];const rows=[header];Object.keys(roleUsers).forEach(email=>{const rs=records.filter(r=>r.user_id===email);rows.push([csvType.value,monthPicker.value,roleUsers[email].employee_no||'',roleUsers[email].display_name,email,rs.filter(r=>workMin(r)>0).length,rs.reduce((s,r)=>s+workMin(r),0),rs.reduce((s,r)=>s+overMin(r),0),rs.reduce((s,r)=>s+nightMin(r),0),rs.filter(r=>isHoliday(r.date)).reduce((s,r)=>s+workMin(r),0)])});const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`timecard_payroll_${monthPicker.value}.csv`;a.click();URL.revokeObjectURL(a.href)}
</script>
</body>
</html>
