    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://cdn.jsdelivr.net;

<script>
  firebase.initializeApp(DEMO_FIREBASE_CONFIG);
  const db = firebase.firestore();
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    db.useEmulator('127.0.0.1', 8080);
  }
  let currentUser = null;
  firebase.auth().onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      const snap = await db.collection('demo_sessions').doc(user.uid).get();
      const d = snap.data();
      if (!snap.exists || !d.active || d.disabled || d.expiresAt.toDate() < new Date()) {
        await firebase.auth().signOut();
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      initApp();
    } catch(e) { window.location.href = 'index.html'; }
  });
  db.collection('demo_config').doc('emergency_stop').get().then(snap => {
    if (snap.exists && snap.data().enabled) {
      const reason = snap.data().reason || 'メンテナンス中です。';
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff5f0;"><div style="text-align:center;padding:40px;"><h1 style="color:#d32f2f;font-size:28px;">⛔ デモ環境停止中</h1><p style="margin-top:16px;color:#615d59;">${reason}</p></div></div>`;
    }
  }).catch(() => {});
</script>
<style>
:root {

  --danger: #dc2626;

}

body {

}

}
.nav-link {

  border-radius: 4px; font-size: 12px; font-weight: 600;

}
.nav-link:hover { background: #eae9e7; }

/* ── レイアウト ── */

#app.loaded { display: block; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

/* ── カード（パネル）── */
.panel {

  border-radius: var(--radius); box-shadow: var(--card-shadow);

/* ── ドロップゾーン ── */

}

<script>
// ─── 状態 ───
let allCards = [];
let tags = [];
let editDocId = null;

// ─── 初期化 ───
function initApp() {
  document.getElementById('app').classList.add('loaded');
  subscribeCards();
}

// ─── ログアウト ───
function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  firebase.auth().signOut()
    .then(() => { location.href = 'index.html'; })
    .catch(() => { location.href = 'index.html'; });
}

// ─── Firestore 購読 ───
function subscribeCards() {
  db.collection('demo_business_cards')
    .where('archived', '==', false)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      allCards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      filterCards();
    }, err => {
      if (err.code !== 'permission-denied') showToast('データ取得エラー: ' + err.message);
    });
}

// ─── フィルタ・描画 ───
function filterCards() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = q
    ? allCards.filter(c =>
        (c.name     || '').toLowerCase().includes(q) ||
        (c.company  || '').toLowerCase().includes(q) ||
        (c.position || '').toLowerCase().includes(q) ||
        (c.tags  || []).some(t => t.toLowerCase().includes(q))
      )
    : allCards;
  document.getElementById('card-count').textContent = filtered.length + ' 件';
  renderCards(filtered);
}

function renderCards(cards) {
  const grid = document.getElementById('card-grid');
  if (cards.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>名刺がありません</p></div>';
    return;
  }
  grid.innerHTML = cards.map(c => `
    <div class="biz-card">
      <div class="biz-card-name">${esc(c.name)}</div>
      ${c.company  ? `<div class="biz-card-company">${esc(c.company)}</div>` : ''}
      ${c.position ? `<div class="biz-card-position">${esc(c.position)}</div>` : ''}
      <div class="biz-card-contact">
        ${c.email ? `<span>✉ ${esc(c.email)}</span>` : ''}
        ${c.tel1  ? `<span>📞 ${esc(c.tel1)}</span>` : ''}
        ${c.tel2  ? `<span>📱 ${esc(c.tel2)}</span>` : ''}
        ${c.address ? `<span>📍 ${esc(c.address)}</span>` : ''}
      </div>
      ${(c.tags||[]).length ? `<div class="biz-card-tags">${c.tags.map(t=>`<span class="biz-card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      ${c.memo ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(c.memo)}">📝 ${esc(c.memo)}</div>` : ''}
      <div class="biz-card-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEdit('${c.id}')">✏️ 編集</button>
        <button class="btn btn-danger btn-sm" onclick="archiveCard('${c.id}', '${esc(c.name)}')">📁 アーカイブ</button>
      </div>
    </div>
  `).join('');
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ─── ファイル選択・ドラッグ ───
let selectedFile = null;

function onFileSelected(file) {
  if (!file) return;
  if (file.size > 20971520) { showToast('20MB 以内のファイルを選択してください'); return; }
  if (!['image/jpeg','image/png'].includes(file.type)) { showToast('JPG または PNG を選択してください'); return; }
  selectedFile = file;
  const preview = document.getElementById('img-preview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.getElementById('ocr-btn').disabled = false;
  document.getElementById('ocr-raw-wrap').style.display = 'none';
  document.getElementById('ocr-raw').value = '';
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('dragover');
}
function onDragLeave(e) {
  document.getElementById('drop-zone').classList.remove('dragover');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) onFileSelected(file);
}

// ─── OCR 実行 ───
async function runOcr() {
  if (!selectedFile) return;
  const btn = document.getElementById('ocr-btn');
  btn.disabled = true;
  btn.textContent = '🔄 解析中...';
  document.getElementById('ocr-progress-wrap').style.display = 'block';
  document.getElementById('ocr-raw-wrap').style.display = 'none';

  const progressBar = document.getElementById('ocr-progress-bar');
  const statusEl = document.getElementById('ocr-status');

  try {
    const worker = await Tesseract.createWorker('jpn', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round((m.progress || 0) * 100);
          progressBar.value = pct;
          statusEl.textContent = `解析中... ${pct}%`;
        } else {
          statusEl.textContent = m.status || '処理中...';
        }
      }
    });

    const { data: { text } } = await worker.recognize(selectedFile);
    await worker.terminate();

    progressBar.value = 100;
    statusEl.textContent = '解析完了';

    const raw = text || '';
    document.getElementById('ocr-raw').value = raw;
    document.getElementById('ocr-raw-wrap').style.display = 'block';

    const fields = extractFields(normalizeLines(raw));
    fillForm(fields);
    showToast('OCR 完了。内容を確認して保存してください。');
  } catch(err) {
    showToast('OCR エラー: ' + (err.message || '不明'));
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 OCR 実行';
    document.getElementById('ocr-progress-wrap').style.display = 'none';
    // メモリ解放
    const prev = document.getElementById('img-preview');
    if (prev.src.startsWith('blob:')) URL.revokeObjectURL(prev.src);
  }
}

// ─── OCR 正規化（クリーンルーム実装）───
function normalizeLines(rawText) {
  let lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
  // 文字間スペース除去: CJK文字+空白+CJK文字 の連続
  lines = lines.map(line => {
    let prev = '';
    while (prev !== line) {
      prev = line;
      line = line.replace(/([　-鿿＀-￯])\s+([　-鿿＀-￯])/g, '$1$2');
    }
    return line;
  });
  return lines;
}

function extractFields(lines) {
  const TITLE_KW = ['代表取締役','取締役','専務','常務','部長','課長','係長','主任','マネージャー','ディレクター','Director','Manager','CEO','CTO','CFO','COO','社長'];
  const CORP_JA  = ['株式会社','有限会社','合同会社','合資会社','一般社団法人','公益財団法人','NPO法人'];
  const CORP_EN  = ['Inc.','Co.,Ltd','LLC','Corp.','Ltd.','GmbH'];

  let company = '', name = '', position = '', email = '', tel1 = '', tel2 = '', zip = '', address = '';

  const allText = lines.join('\n');

  // Email
  const emailM = allText.match(/[\w.+\-]+@[\w\-]+\.[\w.\-]+/);
  if (emailM) email = emailM[0];

  // TEL（日本の電話番号パターン）
  const telAll = allText.match(/0\d{1,4}[-\s(]?\d{1,4}[-\s)]?\d{3,4}/g) || [];
  if (telAll[0]) tel1 = telAll[0];
  if (telAll[1]) tel2 = telAll[1];

  // 郵便番号
  const zipM = allText.match(/〒?\s*(\d{3}-?\d{4})/);
  if (zipM) zip = zipM[1];

  // 住所（都道府県で始まる行）
  const addrPat = /^(?:北海道|東京都|大阪府|京都府|[一-鿿]{2}県)/;
  const addrLine = lines.find(l => addrPat.test(l));
  if (addrLine) address = addrLine;

  // 会社名
  const isCorpLine = l => {
    if (/^[（(]/.test(l)) return false;
    return CORP_JA.some(k => l.includes(k)) || CORP_EN.some(k => l.includes(k));
  };
  const corpLine = lines.find(isCorpLine);
  if (corpLine) company = corpLine;

  // 役職 & 氏名
  const titleIdx = lines.findIndex(l => TITLE_KW.some(k => l.includes(k)));
  if (titleIdx >= 0) {
    const titleLine = lines[titleIdx];
    const foundTitle = TITLE_KW.find(k => titleLine.includes(k));
    if (foundTitle) position = foundTitle;

    // 同一行から氏名を取り出す
    let remainder = titleLine.replace(/[（(][^）)]+[）)]/g, '').trim();
    TITLE_KW.forEach(k => { remainder = remainder.replace(new RegExp(k, 'g'), ''); });
    remainder = remainder.trim();
    const nameRe = /^[一-鿿぀-ゟ゠-ヿ]{2,8}(\s+[一-鿿぀-ゟ゠-ヿ]{1,4})?$/;
    if (remainder && nameRe.test(remainder) && !CORP_JA.some(k => remainder.includes(k))) {
      name = remainder;
    } else {
      // 前後3行から探す
      for (let i = Math.max(0, titleIdx - 3); i <= Math.min(lines.length - 1, titleIdx + 3); i++) {
        if (i === titleIdx) continue;
        const c = lines[i];
        if (nameRe.test(c) && !CORP_JA.some(k => c.includes(k)) && !isCorpLine(c)) {
          name = c; break;
        }
      }
    }
  }

  // 氏名フォールバック（漢字2〜4文字 + スペース + 漢字1〜4文字、または連続漢字3〜6文字）
  if (!name) {
    const re1 = /^[一-鿿]{2,4}\s+[一-鿿]{1,4}$/;
    const re2 = /^[一-鿿]{3,6}$/;
    for (const l of lines) {
      if (l === company) continue;
      if (CORP_JA.some(k => l.includes(k))) continue;
      if (/^[（(]/.test(l)) continue;
      if (email && l.includes(email)) continue;
      if (re1.test(l) || re2.test(l)) { name = l; break; }
    }
  }

  return { company, name, position, email, tel1, tel2, zip, address };
}

// ─── フォーム操作 ───
function fillForm(fields) {
  if (fields.name)     document.getElementById('f-name').value     = fields.name;
  if (fields.company)  document.getElementById('f-company').value  = fields.company;
  if (fields.position) document.getElementById('f-position').value = fields.position;
  if (fields.email)    document.getElementById('f-email').value    = fields.email;
  if (fields.tel1)     document.getElementById('f-tel1').value     = fields.tel1;
  if (fields.tel2)     document.getElementById('f-tel2').value     = fields.tel2;
  if (fields.zip)      document.getElementById('f-zip').value      = fields.zip;
  if (fields.address)  document.getElementById('f-address').value  = fields.address;
}

function resetForm() {
  document.getElementById('card-form').reset();
  tags = [];
  renderTags();
  selectedFile = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('ocr-btn').disabled = true;
  document.getElementById('ocr-raw-wrap').style.display = 'none';
  document.getElementById('ocr-raw').value = '';
}

// ─── タグ管理 ───
function renderTags() {
  const wrap = document.getElementById('tags-wrap');
  wrap.innerHTML = tags.map((t, i) =>
    `<span class="tag-chip">${esc(t)}<button type="button" onclick="removeTag(${i})" aria-label="削除">×</button></span>`
  ).join('');
}

function removeTag(idx) {
  tags.splice(idx, 1);
  renderTags();
}

function addTag(val) {
  const v = val.trim().replace(/,/g, '');
  if (!v || tags.includes(v) || tags.length >= 12) return;
  tags.push(v);
  renderTags();
}

function onTagKeydown(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value;
    addTag(val);
    e.target.value = '';
  }
  if (e.key === 'Backspace' && e.target.value === '' && tags.length > 0) {
    tags.pop();
    renderTags();
  }
}

function onTagInput(e) {
  const val = e.target.value;
  if (val.endsWith(',')) {
    addTag(val.slice(0, -1));
    e.target.value = '';
  }
}

// ─── 保存 ───
async function saveCard(e) {
  e.preventDefault();
  if (!currentUser) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const payload = buildPayload();
    await db.collection('demo_business_cards').add({
      ...payload,
      archived:   false,
      driveOriginalUrl: '',
      isDemo:     true,
      createdBy:  currentUser.uid,
      createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
    });
    showToast('✅ 名刺を保存しました');
    resetForm();
  } catch(err) {
    showToast('保存エラー: ' + (err.message || '不明'));
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 保存';
  }
}

function buildPayload(prefix='f-') {
  const get = id => (document.getElementById(prefix + id) || {}).value || '';
  return {
    name:     get('name').trim(),
    company:  get('company').trim(),
    position: get('position').trim(),
    email:    get('email').trim(),
    tel1:     get('tel1').trim(),
    tel2:     get('tel2').trim(),
    zip:      get('zip').trim(),
    address:  get('address').trim(),
    memo:     get('memo').trim(),
    tags:     prefix === 'f-' ? [...tags] : [],
  };
}

// ─── アーカイブ ───
async function archiveCard(docId, cardName) {
  if (!confirm(`「${cardName}」をアーカイブしますか？`)) return;
  try {
    await db.collection('demo_business_cards').doc(docId).update({
      archived:   true,
      archivedAt: firebase.firestore.FieldValue.serverTimestamp(),
      archivedBy: currentUser.uid,
      updatedBy:  currentUser.uid,
      updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
    });
    showToast('📁 アーカイブしました');
  } catch(err) {
    showToast('エラー: ' + (err.message || '不明'));
  }
}

// ─── 編集モーダル ───
function openEdit(docId) {
  const c = allCards.find(x => x.id === docId);
  if (!c) return;
  editDocId = docId;
  document.getElementById('m-name').value     = c.name     || '';
  document.getElementById('m-company').value  = c.company  || '';
  document.getElementById('m-position').value = c.position || '';
  document.getElementById('m-email').value    = c.email    || '';
  document.getElementById('m-tel1').value     = c.tel1     || '';
  document.getElementById('m-tel2').value     = c.tel2     || '';
  document.getElementById('m-zip').value      = c.zip      || '';
  document.getElementById('m-address').value  = c.address  || '';
  document.getElementById('m-memo').value     = c.memo     || '';
  document.getElementById('m-tags').value     = (c.tags || []).join(', ');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  editDocId = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

async function saveModal() {
  if (!editDocId || !currentUser) return;
  const btn = document.querySelector('#modal-actions .btn-primary');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const tagsVal = (document.getElementById('m-tags').value || '')
      .split(',').map(t => t.trim()).filter(Boolean).slice(0, 12);
    const payload = {
      name:      (document.getElementById('m-name').value     || '').trim(),
      company:   (document.getElementById('m-company').value  || '').trim(),
      position:  (document.getElementById('m-position').value || '').trim(),
      email:     (document.getElementById('m-email').value    || '').trim(),
      tel1:      (document.getElementById('m-tel1').value     || '').trim(),
      tel2:      (document.getElementById('m-tel2').value     || '').trim(),
      zip:       (document.getElementById('m-zip').value      || '').trim(),
      address:   (document.getElementById('m-address').value  || '').trim(),
      memo:      (document.getElementById('m-memo').value     || '').trim(),
      tags:      tagsVal,
      driveOriginalUrl: '',
      isDemo:    true,
      updatedBy: currentUser.uid,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (!payload.name || !payload.company) { showToast('氏名と会社名は必須です'); return; }
    await db.collection('demo_business_cards').doc(editDocId).update(payload);
    showToast('✅ 更新しました');
    closeModal();
  } catch(err) {
    showToast('更新エラー: ' + (err.message || '不明'));
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

// ─── トースト ───
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
