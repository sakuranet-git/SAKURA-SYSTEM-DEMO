<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
  button { background:#0075de; color:#fff; border:none; padding:12px 24px; border-radius:6px; font-size:15px; cursor:pointer; }
  button:disabled { background:#999; cursor:not-allowed; }
  #log { margin-top:20px; background:#f6f5f4; border-radius:6px; padding:16px; font-size:13px; line-height:1.8; white-space:pre-wrap; min-height:100px; }

<body>
<h2>🌸 Firestore シードデータ投入</h2>
<p style="color:#615d59;margin:12px 0;">デモ用の顧客データ・請求書データを Firebase に投入します。<br>
<strong>管理者アカウントでログインして実行してください。</strong></p>
<div style="margin-bottom:12px;">
  <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">管理者メールアドレス</label>
  <input type="email" id="adminEmail" placeholder="admin@example.com" style="width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;">
</div>
<div style="margin-bottom:16px;">
  <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">パスワード</label>
  <input type="password" id="adminPassword" placeholder="パスワード" style="width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;">
</div>
<button id="seedBtn" onclick="runSeed()">シードデータを投入する</button>
<div id="log">管理者メールアドレスとパスワードを入力して実行してください...</div>

<script>
const log = document.getElementById('log');
const btn = document.getElementById('seedBtn');

function addLog(msg, type) {
  const span = document.createElement('span');
  span.className = type || '';
  span.textContent = msg + '\n';
  log.appendChild(span);
}

// v0.1.8: invitation_codes は廃止（Email/Password 認証に移行済み）

  { id:'demo-003', status:'完了', dateReq:'2026-01-20', dateWork:'2026-01-28', timeWorkStart:'09:00', timeWorkEnd:'11:30', taskType:'リモート設定', name:'テスト不動産有限会社', kana:'テストフドウサンユウゲンガイシャ', email:'test-fudosan@example.com', agency:'デモ代理店A', staff:'佐藤デモ', tel1:'000-0000-0003', tel2:'', zip:'000-0003', address:'デモ県デモ市テスト通り7-8-9', plan:'SAKURA-NET光 10G', cafNumber:'DEMO-CAF-003', accessKey:'DEMO-KEY-003', provider:'さくらデモプロバイダ', constDate:'2026-01-28', pcCount:'8', connStatus:'開通済み', wanLanIp:'192.168.1.1', routerIp:'192.168.1.254', wifiIp:'192.168.1.253', mailIdPass:'realestate@example.com / demopass2', serverIp:'192.168.1.10', serverUserPass:'admin / demoserver', copierIp:'192.168.1.50', memo:'ファイルサーバーとの連携設定が必要', feeBase:'80000', feeTravel:'0', feeParts:'5000', amount:'85000', isDemo:true },
  { id:'demo-004', status:'出張サポート', dateReq:'2026-03-01', dateWork:'2026-03-10', timeWorkStart:'14:00', timeWorkEnd:'17:00', taskType:'出張サポート', name:'モックアップ美容室', kana:'モックアップビヨウシツ', email:'mock-beauty@example.com', agency:'デモ代理店C', staff:'高橋デモ', tel1:'000-0000-0004', tel2:'', zip:'000-0004', address:'デモ県サンプル市ダミー街10-11', plan:'SAKURA-NET光 1G', cafNumber:'DEMO-CAF-004', accessKey:'DEMO-KEY-004', provider:'さくらデモプロバイダ', constDate:'2026-02-20', pcCount:'2', connStatus:'開通済み', wanLanIp:'192.168.2.1', routerIp:'192.168.2.254', wifiIp:'192.168.2.253', mailIdPass:'', serverIp:'', serverUserPass:'', copierIp:'', memo:'予約システムのWifi接続トラブル', feeBase:'20000', feeTravel:'8000', feeParts:'0', amount:'28000', isDemo:true },
  { id:'demo-005', status:'未設定', dateReq:'2026-04-01', dateWork:'', timeWorkStart:'', timeWorkEnd:'', taskType:'光回線開通', name:'デモ製造株式会社', kana:'デモセイゾウカブシキガイシャ', email:'demo-mfg@example.com', agency:'デモ代理店B', staff:'伊藤デモ', tel1:'000-0000-0005', tel2:'000-0000-0055', zip:'000-0005', address:'デモ県テスト市架空工業団地1-1', plan:'SAKURA-NET光 10G', cafNumber:'DEMO-CAF-005', accessKey:'', provider:'さくらデモプロバイダ', constDate:'', pcCount:'20', connStatus:'申込済み', wanLanIp:'', routerIp:'', wifiIp:'', mailIdPass:'', serverIp:'', serverUserPass:'', copierIp:'', memo:'工場内ネットワーク全体の見直し予定', feeBase:'150000', feeTravel:'10000', feeParts:'30000', amount:'190000', isDemo:true }

const invoices = [
  { id:'inv-demo-001', invoiceNumber:'DEMO-2026-001', status:'送付済み', invDate:'2026-01-31', billingMonth:'2026-01', clientName:'架空商事株式会社', clientContact:'田中デモ 様', clientEmail:'info-kakuu@example.com', clientAddress:'デモ県デモ市架空町1-2-3', paymentMethod:'銀行振込', note:'光回線開通工事費用', items:[{name:'光回線開通工事費',qty:1,unit:'式',price:50000},{name:'出張費',qty:1,unit:'式',price:5000}], subtotal:55000, tax:5500, total:60500, isDemo:true },
  { id:'inv-demo-002', invoiceNumber:'DEMO-2026-002', status:'未送付', invDate:'2026-02-28', billingMonth:'2026-02', clientName:'サンプル歯科クリニック', clientContact:'鈴木デモ 先生', clientEmail:'sample-dental@example.com', clientAddress:'デモ県デモ市サンプル町4-5-6', paymentMethod:'銀行振込', note:'光回線工事・機器費用', items:[{name:'光回線開通工事費',qty:1,unit:'式',price:30000},{name:'出張費',qty:1,unit:'式',price:3000},{name:'LANケーブル',qty:2,unit:'本',price:1000}], subtotal:35000, tax:3500, total:38500, isDemo:true },
  { id:'inv-demo-003', invoiceNumber:'DEMO-2026-003', status:'入金済み', invDate:'2026-01-31', billingMonth:'2026-01', clientName:'テスト不動産有限会社', clientContact:'佐藤デモ 様', clientEmail:'test-fudosan@example.com', clientAddress:'デモ県デモ市テスト通り7-8-9', paymentMethod:'銀行振込', note:'光回線・サーバー設定費用', items:[{name:'光回線開通工事費',qty:1,unit:'式',price:80000},{name:'サーバー設定費',qty:1,unit:'式',price:5000}], subtotal:85000, tax:8500, total:93500, isDemo:true },
  { id:'inv-demo-004', invoiceNumber:'DEMO-2026-004', status:'送付済み', invDate:'2026-03-31', billingMonth:'2026-03', clientName:'モックアップ美容室', clientContact:'高橋デモ 様', clientEmail:'mock-beauty@example.com', clientAddress:'デモ県サンプル市ダミー街10-11', paymentMethod:'現金', note:'Wifi障害対応', items:[{name:'出張サポート費',qty:1,unit:'式',price:20000},{name:'出張費',qty:1,unit:'式',price:8000}], subtotal:28000, tax:2800, total:30800, isDemo:true }
];

async function runSeed() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass  = document.getElementById('adminPassword').value;
  if (!email || !pass) { alert('メールアドレスとパスワードを入力してください。'); return; }

  btn.disabled = true;
  log.textContent = '';
  addLog('シードデータ投入を開始します...');

  try {
    if (!firebase.apps.length) firebase.initializeApp(DEMO_FIREBASE_CONFIG);
    const db = firebase.firestore();
    addLog(`✓ Firebase 接続: ${DEMO_FIREBASE_CONFIG.projectId}`, 'ok');

    // Email/Password 認証（demo_sessions 検証）
    const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
    const snap = await db.collection('demo_sessions').doc(cred.user.uid).get();
    const d = snap.data();
    if (!snap.exists || !d.active || d.disabled || d.expiresAt.toDate() < new Date()) {
      throw new Error('有効なデモセッションがありません。管理者アカウントを確認してください。');
    }
    addLog('✓ 管理者認証 完了', 'ok');
    const uid = cred.user.uid;
    const TS  = firebase.firestore.Timestamp;

    // 顧客データ
    addLog('\n--- 顧客データ ---');
    for (const c of customers) {
      await db.collection('customer_records').doc(c.id).set({ ...c, seededAt: firebase.firestore.FieldValue.serverTimestamp() });
      addLog(`✓ ${c.name}`, 'ok');
    }

    // 請求書データ
    addLog('\n--- 請求書データ ---');
    for (const inv of invoices) {
      await db.collection('invoices').doc(inv.id).set({ ...inv, seededAt: firebase.firestore.FieldValue.serverTimestamp() });
      addLog(`✓ ${inv.invoiceNumber} (${inv.clientName})`, 'ok');
    }

    // ── v0.2.0: グループウェアシードデータ ──

    // 掲示板
    addLog('\n--- 掲示板（demo_board_posts）---');
    const now = TS.now();
    const boardPosts = [
      { title: 'SAKURA SYSTEM デモ環境へようこそ', body: 'このデモ環境では、顧客管理・請求書・グループウェアの各機能をお試しいただけます。\n\nサンプルデータは架空のものです。安心してご操作ください。', category: 'お知らせ' },
      { title: '今月の定例会議について', body: '来週月曜日の定例会議は、通常通り午前10時からの予定です。\n議題：Q2進捗確認・新規顧客対応フロー・システム改善提案\n\n参加必須でお願いします。', category: '業務連絡' },
      { title: '先日のランチ会ありがとうございました！', body: '先週のチームランチ会、楽しかったですね。\n次回は来月を予定しています。また詳細をお知らせします。', category: '雑談' }
    ];
    for (const p of boardPosts) {
      await db.collection('demo_board_posts').add({
        title: p.title, body: p.body, category: p.category,
        isDemo: true, archived: false,
        createdAt: now, createdBy: uid
      });
      addLog(`✓ [${p.category}] ${p.title}`, 'ok');
    }

    // タスク
    addLog('\n--- タスク（demo_todos）---');
    const todos = [
      { title: '架空商事 光回線 設定確認書を提出する', priority: '高', dueDate: (() => { const d = new Date(); d.setDate(d.getDate()+7); return d.toISOString().split('T')[0]; })(), memo: '開通後30日以内に要提出' },
      { title: 'デモ環境マニュアルを最新版に更新する',  priority: '中', dueDate: (() => { const d = new Date(); d.setDate(d.getDate()+14); return d.toISOString().split('T')[0]; })(), memo: 'グループウェア機能の説明を追記' },
      { title: '月次レポート草案を確認する',              priority: '低', dueDate: '', memo: '' }
    ];
    for (const t of todos) {
      const doc = {
        title: t.title, priority: t.priority, done: false,
        isDemo: true, archived: false,
        createdAt: now, createdBy: uid
      };
      if (t.dueDate) doc.dueDate = t.dueDate;
      if (t.memo)    doc.memo    = t.memo;
      await db.collection('demo_todos').add(doc);
      addLog(`✓ [${t.priority}] ${t.title}`, 'ok');
    }

    // カレンダー
    addLog('\n--- カレンダー（demo_calendar_events）---');
    const d5 = new Date(); d5.setDate(d5.getDate()+5); d5.setHours(10,0,0,0);
    const d5e= new Date(d5); d5e.setHours(11,0,0,0);
    const d10= new Date(); d10.setDate(d10.getDate()+10); d10.setHours(0,0,0,0);
    const d20= new Date(); d20.setDate(d20.getDate()+20); d20.setHours(0,0,0,0);
    const calEvs = [
      { title: 'チームミーティング', startAt: TS.fromDate(d5), endAt: TS.fromDate(d5e), allDay: false, memo: '週次定例・各自進捗共有' },
      { title: '月次定例会議',       startAt: TS.fromDate(d10), endAt: TS.fromDate(d10), allDay: true,  memo: 'Q2進捗・方針確認' },
      { title: 'システムメンテナンス', startAt: TS.fromDate(d20), endAt: TS.fromDate(d20), allDay: true, memo: '深夜0:00〜6:00 予定' }
    ];
    for (const e of calEvs) {
      const doc = {
        title: e.title, startAt: e.startAt, endAt: e.endAt, allDay: e.allDay,
        isDemo: true, archived: false,
        createdAt: now, createdBy: uid
      };
      if (e.memo) doc.memo = e.memo;
      await db.collection('demo_calendar_events').add(doc);
      addLog(`✓ ${e.title}`, 'ok');
    }

    addLog('\n✅ 全データの投入が完了しました！', 'ok');
    addLog('このページを閉じてデモ環境をご利用ください。');

  } catch(e) {
    addLog('\n❌ エラー: ' + e.message, 'err');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
